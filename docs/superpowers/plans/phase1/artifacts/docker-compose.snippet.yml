# ── VOLUMES (add to volumes: section) ─────────────────────────────────────────

  sales-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/sales-db
  sales-redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/sales-redis
  sales-minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/sales-minio
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/prometheus
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/grafana
  loki-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/loki
  metabase-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/metabase

# ── SERVICES (add to services: section) ──────────────────────────────────────

  # ────────── SALES ENGINE DATABASE ──────────────────────────────────────────
  sales-db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${SALES_DB_PORT:-2360}:5432"
    environment:
      POSTGRES_DB: ${SALES_PG_DB:-salesengine}
      POSTGRES_USER: ${SALES_PG_USER:-salesengine}
      POSTGRES_PASSWORD: ${SALES_PG_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - sales-db-data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SALES_PG_USER:-salesengine} -d ${SALES_PG_DB:-salesengine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ────────── SALES ENGINE REDIS ─────────────────────────────────────────────
  sales-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${SALES_REDIS_PORT:-2361}:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - sales-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────── SALES ENGINE API ────────────────────────────────────────────────
  sales-api:
    image: ${SALES_IMAGE:-sales-engine:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${SALES_API_PORT:-2359}:3000"
    environment:
      ROLE: api
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${SALES_PG_USER:-salesengine}:${SALES_PG_PASSWORD}@sales-db:5432/${SALES_PG_DB:-salesengine}
      REDIS_URL: redis://sales-redis:6379
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET:-}
      CAL_WEBHOOK_SECRET: ${CAL_WEBHOOK_SECRET:-}
      EMAIL_PROVIDER_WEBHOOK_SECRET: ${EMAIL_PROVIDER_WEBHOOK_SECRET:-}
    depends_on:
      sales-db:
        condition: service_healthy
      sales-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────── SALES ENGINE WORKER ─────────────────────────────────────────────
  sales-worker:
    image: ${SALES_IMAGE:-sales-engine:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - salesstack
    environment:
      ROLE: worker
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${SALES_PG_USER:-salesengine}:${SALES_PG_PASSWORD}@sales-db:5432/${SALES_PG_DB:-salesengine}
      REDIS_URL: redis://sales-redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      sales-db:
        condition: service_healthy
      sales-redis:
        condition: service_healthy

  # ────────── MINIO (Phase 2 — start with: docker compose --profile phase2 up) ──
  sales-minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles:
      - phase2
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${MINIO_API_PORT:-2362}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-2363}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - sales-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ────────── MONITORING STACK ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${PROMETHEUS_PORT:-2365}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${GRAFANA_PORT:-2366}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:2366}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${LOKI_PORT:-2367}:3100"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki

  # ────────── METABASE (Business Intelligence) ────────────────────────────────
  sales-metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "0.0.0.0:${METABASE_PORT:-2368}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${SALES_PG_DB:-salesengine}
      MB_DB_PORT: 5432
      MB_DB_USER: metabase_ro
      MB_DB_PASS: ${METABASE_DB_PASS}
      MB_DB_HOST: sales-db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      sales-db:
        condition: service_healthy
