# Trust X-Forwarded-Proto header from reverse proxy (e.g. Nginx Proxy Manager).
# When NPM forwards HTTPS traffic to Mautic over HTTP, this directive tells
# Apache to treat the connection as secure, preventing an infinite 301 redirect loop.
#
# This is loaded at the server level (conf-enabled) rather than .htaccess so it
# survives Mautic updates and is processed before any application logic.
SetEnvIf X-Forwarded-Proto "https" HTTPS=on
