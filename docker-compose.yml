networks:
  salesstack:
    driver: bridge
    name: salesstack

volumes:
  twenty-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/twenty-db
  twenty-redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/twenty-redis
  mautic-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/mautic-db
  mautic-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/mautic-data
  n8n-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/n8n-db
  n8n-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/n8n-data
  waha-sessions:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/volumes/waha-sessions

services:
  # ===========================================================================
  # DATABASES
  # ===========================================================================

  twenty-db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${TWENTY_DB_PORT:-2354}:5432"
    environment:
      POSTGRES_DB: ${TWENTY_PG_DB}
      POSTGRES_USER: ${TWENTY_PG_USER}
      POSTGRES_PASSWORD: ${TWENTY_PG_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - twenty-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TWENTY_PG_USER} -d ${TWENTY_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  twenty-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${TWENTY_REDIS_PORT:-2357}:6379"
    volumes:
      - twenty-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mautic-db:
    image: mysql:latest
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${MAUTIC_DB_PORT:-2355}:3306"
    environment:
      MYSQL_DATABASE: ${MAUTIC_DB_NAME}
      MYSQL_USER: ${MAUTIC_DB_USER}
      MYSQL_PASSWORD: ${MAUTIC_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MAUTIC_DB_ROOT_PASSWORD}
    volumes:
      - mautic-db-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MAUTIC_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n-db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${N8N_DB_PORT:-2356}:5432"
    environment:
      POSTGRES_DB: ${N8N_PG_DB}
      POSTGRES_USER: ${N8N_PG_USER}
      POSTGRES_PASSWORD: ${N8N_PG_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_PG_USER} -d ${N8N_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # APPLICATION SERVERS
  # ===========================================================================

  twenty-server:
    image: ${TWENTY_IMAGE}
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${TWENTY_PORT:-2350}:3000"
    environment:
      PG_DATABASE_URL: postgres://${TWENTY_PG_USER}:${TWENTY_PG_PASSWORD}@twenty-db:5432/${TWENTY_PG_DB}
      REDIS_URL: redis://twenty-redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET}
      SERVER_URL: ${TWENTY_SERVER_URL}
      SIGN_IN_PREFILLED: ${TWENTY_SIGN_IN_PREFILLED}
      MESSAGE_QUEUE_TYPE: bull-mq
      ENABLE_DB_MIGRATIONS: "true"
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  mautic-web:
    image: ${MAUTIC_IMAGE}
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${MAUTIC_PORT:-2351}:80"
    environment:
      DOCKER_MAUTIC_ROLE: mautic_web
      MAUTIC_DB_HOST: mautic-db
      MAUTIC_DB_PORT: "3306"
      MAUTIC_DB_NAME: ${MAUTIC_DB_NAME}
      MAUTIC_DB_USER: ${MAUTIC_DB_USER}
      MAUTIC_DB_PASSWORD: ${MAUTIC_DB_PASSWORD}
      MAUTIC_SITE_URL: ${MAUTIC_SITE_URL}
    volumes:
      - mautic-data:/var/www/html
    depends_on:
      mautic-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/s/login || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  waha:
    image: ${WAHA_IMAGE}
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${WAHA_PORT:-2352}:3000"
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://localhost:2352}
      WAHA_RESTART_ALL_SESSIONS: "true"
    volumes:
      - waha-sessions:/app/.sessions
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    image: ${N8N_IMAGE}
    restart: unless-stopped
    networks:
      - salesstack
    ports:
      - "127.0.0.1:${N8N_PORT:-2353}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_PG_DB}
      DB_POSTGRESDB_USER: ${N8N_PG_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_PG_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_RUNNERS_MODE: internal
      GENERIC_TIMEZONE: ${N8N_TIMEZONE}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      n8n-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ===========================================================================
  # WORKERS
  # ===========================================================================

  twenty-worker:
    image: ${TWENTY_IMAGE}
    restart: unless-stopped
    networks:
      - salesstack
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://${TWENTY_PG_USER}:${TWENTY_PG_PASSWORD}@twenty-db:5432/${TWENTY_PG_DB}
      REDIS_URL: redis://twenty-redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET}
      SERVER_URL: ${TWENTY_SERVER_URL}
      MESSAGE_QUEUE_TYPE: bull-mq
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
    depends_on:
      twenty-server:
        condition: service_healthy

  mautic-cron:
    image: ${MAUTIC_IMAGE}
    restart: unless-stopped
    networks:
      - salesstack
    environment:
      DOCKER_MAUTIC_ROLE: mautic_cron
      MAUTIC_DB_HOST: mautic-db
      MAUTIC_DB_PORT: "3306"
      MAUTIC_DB_NAME: ${MAUTIC_DB_NAME}
      MAUTIC_DB_USER: ${MAUTIC_DB_USER}
      MAUTIC_DB_PASSWORD: ${MAUTIC_DB_PASSWORD}
      MAUTIC_SITE_URL: ${MAUTIC_SITE_URL}
    volumes:
      - mautic-data:/var/www/html
    depends_on:
      mautic-web:
        condition: service_healthy

  mautic-worker:
    image: ${MAUTIC_IMAGE}
    restart: unless-stopped
    networks:
      - salesstack
    environment:
      DOCKER_MAUTIC_ROLE: mautic_worker
      MAUTIC_DB_HOST: mautic-db
      MAUTIC_DB_PORT: "3306"
      MAUTIC_DB_NAME: ${MAUTIC_DB_NAME}
      MAUTIC_DB_USER: ${MAUTIC_DB_USER}
      MAUTIC_DB_PASSWORD: ${MAUTIC_DB_PASSWORD}
      MAUTIC_SITE_URL: ${MAUTIC_SITE_URL}
    volumes:
      - mautic-data:/var/www/html
    depends_on:
      mautic-web:
        condition: service_healthy
